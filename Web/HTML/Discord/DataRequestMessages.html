<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Archive Browser</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0b0d10;
    --bg-sidebar: #0f1114;
    --bg-main: #131619;
    --bg-msg-hover: rgba(255,255,255,0.02);
    --bg-input: #1a1d22;
    --border: rgba(255,255,255,0.06);
    --text-primary: #e0e2e6;
    --text-secondary: #8a8f98;
    --text-muted: #555a63;
    --accent: #6c8cff;
    --accent-dim: rgba(108,140,255,0.12);
    --green: #4ade80;
    --orange: #fb923c;
    --pink: #f472b6;
    --red: #f87171;
    --yellow: #fbbf24;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1::before {
    content: '';
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(108,140,255,0.5);
  }

  .sidebar-header .stats {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .search-box {
    margin: 12px 16px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-box svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .channel-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 16px;
  }

  .channel-group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 14px 12px 6px;
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .channel-item:hover { background: rgba(255,255,255,0.04); }
  .channel-item.active { background: var(--accent-dim); }
  .channel-item.active .channel-name { color: var(--accent); }

  .channel-icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .channel-item.active .channel-icon { color: var(--accent); }

  .channel-info { flex: 1; min-width: 0; }

  .channel-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s;
  }

  .channel-server {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .channel-badge {
    font-size: 10px;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    flex-shrink: 0;
  }

  /* ── Main Panel ── */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-main);
    height: 100vh;
  }

  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .main-header .hash {
    font-size: 20px;
    color: var(--text-muted);
    font-weight: 700;
  }

  .main-header .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .main-header .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .main-header .description {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .message-search {
    margin-left: auto;
    position: relative;
  }

  .message-search input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px 6px 30px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s, width 0.3s;
  }

  .message-search input:focus {
    border-color: var(--accent);
    width: 280px;
  }

  .message-search input::placeholder { color: var(--text-muted); }

  .message-search svg {
    position: absolute;
    left: 8px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 14px; height: 14px;
  }

  /* ── Messages ── */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 360px; }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 24px;
    margin: 8px 0;
  }

  .date-divider::before,
  .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .date-divider span {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .message {
    display: flex;
    gap: 14px;
    padding: 6px 24px;
    transition: background 0.1s;
  }

  .message:hover { background: var(--bg-msg-hover); }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }

  .msg-author {
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .msg-author:hover { text-decoration: underline; }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
  }

  .msg-content {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg-content.empty-msg {
    font-style: italic;
    color: var(--text-muted);
    font-size: 12px;
  }

  .msg-attachment {
    margin-top: 6px;
  }

  .msg-attachment a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    background: var(--accent-dim);
    padding: 5px 10px;
    border-radius: 6px;
    transition: background 0.15s;
    font-family: 'JetBrains Mono', monospace;
    word-break: break-all;
  }

  .msg-attachment a:hover { background: rgba(108,140,255,0.2); }

  .msg-attachment img.preview {
    display: block;
    max-width: 360px;
    max-height: 260px;
    border-radius: 8px;
    margin-top: 6px;
    border: 1px solid var(--border);
  }

  /* ── Footer ── */
  .footer-bar {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .footer-bar .info-chip {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-input);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 6px;
  }

  .loading .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loading .dot:nth-child(2) { animation-delay: 0.15s; }
  .loading .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── Error banner ── */
  .error-banner {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    padding: 20px 28px;
    margin: 24px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
  }

  .error-banner strong { display: block; margin-bottom: 4px; font-size: 14px; }
  .error-banner code {
    display: block;
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* ── Mobile ── */
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .sidebar.open {
      display: flex;
      position: fixed;
      inset: 0;
      width: 100%;
      z-index: 100;
    }
    .mobile-toggle {
      display: flex !important;
    }
  }

  .mobile-toggle {
    display: none;
    background: none; border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px;
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Archive Browser</h1>
    <div class="stats" id="sidebar-stats">Loading…</div>
  </div>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="channel-search" placeholder="Filter channels…">
  </div>
  <div class="channel-list" id="channel-list"></div>
</aside>

<main class="main-panel">
  <div class="main-header" id="main-header">
    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="hash">#</span>
    <span class="title" id="header-title">Select a channel</span>
  </div>
  <div class="messages-container" id="messages-container">
    <div class="empty-state">
      <div class="icon">💬</div>
      <p>Pick a channel from the sidebar to view its message history.</p>
    </div>
  </div>
  <div class="footer-bar" id="footer-bar">
    <span class="info-chip" id="footer-info">No channel selected</span>
  </div>
</main>

<script>
const COLORS = ['#6c8cff','#4ade80','#fb923c','#f472b6','#f87171','#fbbf24','#22d3ee','#a78bfa','#34d399','#f97316'];

let index = {};
let channels = {};
let activeChannel = null;

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return COLORS[Math.abs(h) % COLORS.length];
}

function parseChannelLabel(label) {
  const m = label.match(/^(.+?)\s+in\s+(.+)$/);
  return m ? { name: m[1], server: m[2] } : { name: label, server: '' };
}

function formatDate(ts) {
  const d = new Date(ts.replace(' ', 'T') + 'Z');
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
}

function formatTime(ts) {
  const d = new Date(ts.replace(' ', 'T') + 'Z');
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
}

function dateKey(ts) {
  return ts.split(' ')[0];
}

function isImageUrl(url) {
  return /\.(png|jpe?g|gif|webp)/i.test(url);
}

function getFilename(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/');
    return parts[parts.length - 1] || 'attachment';
  } catch { return 'attachment'; }
}

async function init() {
  try {
    const res = await fetch('./index.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    index = await res.json();
  } catch (e) {
    document.getElementById('messages-container').innerHTML = `
      <div class="error-banner">
        <strong>Could not load index.json</strong>
        This page needs to be served from the same directory as your export files.
        <code>cd /path/to/export && python3 -m http.server 8000</code>
      </div>`;
    return;
  }

  const entries = Object.entries(index);
  document.getElementById('sidebar-stats').textContent = `${entries.length} CHANNELS`;

  // Sort by server name, then channel name
  entries.sort((a, b) => {
    const pa = parseChannelLabel(a[1]), pb = parseChannelLabel(b[1]);
    return (pa.server + pa.name).localeCompare(pb.server + pb.name);
  });

  renderChannelList(entries);

  document.getElementById('channel-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = entries.filter(([, label]) => label.toLowerCase().includes(q));
    renderChannelList(filtered);
  });
}

function renderChannelList(entries) {
  const list = document.getElementById('channel-list');
  list.innerHTML = '';

  let currentServer = null;

  for (const [id, label] of entries) {
    const { name, server } = parseChannelLabel(label);

    if (server !== currentServer) {
      currentServer = server;
      const group = document.createElement('div');
      group.className = 'channel-group-label';
      group.textContent = server || 'Unknown Server';
      list.appendChild(group);
    }

    const item = document.createElement('div');
    item.className = 'channel-item' + (activeChannel === id ? ' active' : '');
    item.innerHTML = `
      <span class="channel-icon">#</span>
      <div class="channel-info">
        <div class="channel-name">${escHtml(name)}</div>
      </div>`;
    item.addEventListener('click', () => loadChannel(id, label));
    list.appendChild(item);
  }
}

async function loadChannel(id, label) {
  activeChannel = id;
  document.getElementById('sidebar').classList.remove('open');

  // Update sidebar highlights
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.channel-item');
  items.forEach(el => {
    const nameEl = el.querySelector('.channel-name');
    const { name } = parseChannelLabel(label);
    if (nameEl && nameEl.textContent === name) el.classList.add('active');
  });

  const { name, server } = parseChannelLabel(label);
  document.getElementById('header-title').textContent = name;

  const container = document.getElementById('messages-container');
  container.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  try {
    const dir = `c${id}`;
    const res = await fetch(`./${dir}/messages.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let messages = await res.json();

    // Also try to load channel.json for metadata
    let channelMeta = {};
    try {
      const cr = await fetch(`./${dir}/channel.json`);
      if (cr.ok) channelMeta = await cr.json();
    } catch {}

    // Sort messages oldest → newest
    messages.sort((a, b) => (a.Timestamp || '').localeCompare(b.Timestamp || ''));

    renderMessages(messages, name, server);

    const footerInfo = document.getElementById('footer-info');
    footerInfo.textContent = `${messages.length} messages · ${server}`;
  } catch (e) {
    container.innerHTML = `
      <div class="error-banner">
        <strong>Could not load messages</strong>
        Failed to fetch c${id}/messages.json: ${escHtml(e.message)}
      </div>`;
  }
}

function renderMessages(messages, channelName, server) {
  const container = document.getElementById('messages-container');
  container.innerHTML = '';

  if (messages.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🕊️</div><p>No messages in this channel.</p></div>';
    return;
  }

  // Setup message search
  const headerEl = document.getElementById('main-header');
  let searchInput = document.getElementById('msg-search');
  if (!searchInput) {
    const wrap = document.createElement('div');
    wrap.className = 'message-search';
    wrap.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="msg-search" placeholder="Search messages…">`;
    headerEl.appendChild(wrap);
    searchInput = document.getElementById('msg-search');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      document.querySelectorAll('.message').forEach(el => {
        const text = el.dataset.content || '';
        el.style.display = text.includes(q) ? '' : 'none';
      });
      // Hide date dividers with no visible messages after them
      document.querySelectorAll('.date-divider').forEach(dd => {
        let next = dd.nextElementSibling;
        let hasVisible = false;
        while (next && !next.classList.contains('date-divider')) {
          if (next.style.display !== 'none') hasVisible = true;
          next = next.nextElementSibling;
        }
        dd.style.display = hasVisible || !q ? '' : 'none';
      });
    });
  }
  searchInput.value = '';

  // Determine unique authors for consistent coloring
  const authors = new Map();
  for (const msg of messages) {
    const author = msg.Author || 'Unknown';
    if (!authors.has(author)) authors.set(author, hashColor(author));
  }

  let lastDate = null;
  const frag = document.createDocumentFragment();

  for (const msg of messages) {
    const msgDate = dateKey(msg.Timestamp || '');
    if (msgDate !== lastDate) {
      lastDate = msgDate;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${formatDate(msg.Timestamp)}</span>`;
      frag.appendChild(div);
    }

    const author = msg.Author || 'Unknown';
    const color = authors.get(author);
    const initial = author.charAt(0).toUpperCase();
    const content = msg.Contents || '';
    const attachments = msg.Attachments || '';

    const el = document.createElement('div');
    el.className = 'message';
    el.dataset.content = (content + ' ' + author).toLowerCase();

    let attachHtml = '';
    if (attachments) {
      const urls = attachments.split(' ').filter(u => u.trim());
      for (const url of urls) {
        if (isImageUrl(url)) {
          attachHtml += `<div class="msg-attachment"><a href="${escAttr(url)}" target="_blank" rel="noopener">📎 ${escHtml(getFilename(url))}</a><img class="preview" src="${escAttr(url)}" loading="lazy" onerror="this.style.display='none'"></div>`;
        } else {
          attachHtml += `<div class="msg-attachment"><a href="${escAttr(url)}" target="_blank" rel="noopener">📎 ${escHtml(getFilename(url))}</a></div>`;
        }
      }
    }

    el.innerHTML = `
      <div class="msg-avatar" style="background:${color}">${initial}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-author" style="color:${color}">${escHtml(author)}</span>
          <span class="msg-time">${formatTime(msg.Timestamp)}</span>
        </div>
        ${content
          ? `<div class="msg-content">${escHtml(content)}</div>`
          : (attachments ? '' : `<div class="msg-content empty-msg">[empty message]</div>`)}
        ${attachHtml}
      </div>`;
    frag.appendChild(el);
  }

  container.appendChild(frag);
  container.scrollTop = container.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
